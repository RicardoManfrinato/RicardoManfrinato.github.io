<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receita</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <a href="index.html">🍳 Minhas Receitas</a>
    </div>
    <a href="index.html" class="btn-back">← Voltar</a>
  </header>

  <main class="container" id="receitaContainer">
    <p>Carregando receita...</p>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const receitaId = urlParams.get('id');

    async function carregarDetalhes() {
      const container = document.getElementById('receitaContainer');

      if (!receitaId) {
        container.innerHTML = '<p>Receita não encontrada.</p>';
        return;
      }

      try {
        const res = await fetch(`receitas/${receitaId}.json`);
        const rec = await res.json();

        container.innerHTML = `
          <article class="receita-detalhe">
            <h1>${rec.titulo}</h1>
            <div class="meta-info">
              <span>🏷️ <strong>Categoria:</strong> ${rec.categoria}</span> | 
              <span>⏱️ <strong>Tempo:</strong> ${rec.tempoPreparo}</span> | 
              <span>🍽️ <strong>Rendimento:</strong> ${rec.rendimento}</span>
            </div>
            
            <img src="${rec.imagem}" alt="${rec.titulo}" class="img-destaque">

            <p class="descricao-longa">${rec.descricao}</p>

            <div class="secao-receita">
              <h2>🛒 Ingredientes</h2>
              <ul>
                ${rec.ingredientes.map(ing => `<li>${ing}</li>`).join('')}
              </ul>
            </div>

            <div class="secao-receita">
              <h2>👩‍🍳 Modo de Preparo</h2>
              <ol>
                ${rec.modoPreparo.map(passo => `<li>${passo}</li>`).join('')}
              </ol>
            </div>
          </article>
        `;
      } catch (err) {
        container.innerHTML = '<p>Erro ao carregar a receita.</p>
          <pre>${err.message}</pre>';
        
      }
    }

    carregarDetalhes();
  </script>
</body>
</html>
